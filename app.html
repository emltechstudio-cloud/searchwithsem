<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search with SEM</title>
    <meta name="description" content="Fast Wikipedia search — summaries, images, trending topics, related articles.">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4285f4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --blue: #4285f4;
            --red: #ea4335;
            --yellow: #fbbc05;
            --green: #34a853;
            --text: #202124;
            --text-light: #5f6368;
            --bg: #ffffff;
            --card-bg: #f8f9fa;
            --border: #dadce0;
            --shadow: 0 1px 6px rgba(32,33,36,0.1);
            --shadow-hover: 0 4px 12px rgba(32,33,36,0.15);
        }
        [data-theme="dark"] {
            --text: #e8eaed;
            --text-light: #9aa0a6;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --border: #3c4043;
            --shadow: 0 1px 6px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }
        @media (display-mode: standalone) {
            header { padding-top: max(20px, env(safe-area-inset-top)); }
            footer { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        }

        /* ── Loading ── */
        .loading {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .loading.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-light); font-size: 14px; }

        /* ── Header ── */
        header {
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            margin-bottom: 10px;
        }
        .logo span { transition: transform 0.2s; }
        .logo:hover span { transform: translateY(-2px); }
        .logo .c1 { color: var(--blue); }
        .logo .c2 { color: var(--red); }
        .logo .c3 { color: var(--yellow); }
        .logo .c4 { color: var(--green); }
        .logo .c5 { color: var(--blue); }
        .logo .c6 { color: var(--red); }
        .search-wrap {
            position: relative;
            max-width: 640px;
        }
        .search-box {
            width: 100%;
            padding: 13px 88px 13px 18px;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--bg);
            color: var(--text);
            box-shadow: var(--shadow);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            border-color: var(--blue);
            box-shadow: 0 1px 14px rgba(66,133,244,0.2);
        }
        .search-actions {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 5px;
        }
        .icon-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--blue);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s, transform 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: #3367d6; transform: scale(1.06); }
        .icon-btn.listening { background: var(--red); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(234,67,53,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(234,67,53,0); }
            100% { box-shadow: 0 0 0 0 rgba(234,67,53,0); }
        }

        /* ── Main ── */
        main { flex: 1; overflow-y: auto; }

        /* ── Home ── */
        .home {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 20px 90px;
            text-align: center;
        }
        .home-logo {
            font-size: 68px;
            font-weight: 500;
            letter-spacing: -3px;
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            margin-bottom: 6px;
        }
        .home-logo .c1 { color: var(--blue); }
        .home-logo .c2 { color: var(--red); }
        .home-logo .c3 { color: var(--yellow); }
        .home-logo .c4 { color: var(--green); }
        .home-logo .c5 { color: var(--blue); }
        .home-logo .c6 { color: var(--red); }
        .home-sub {
            color: var(--text-light);
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 28px;
        }
        .shortcuts {
            display: flex;
            gap: 10px;
            margin-bottom: 36px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shortcut {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .shortcut:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .shortcut .fa-google { color: #4285f4; }
        .shortcut .fa-youtube { color: #ff0000; }

        /* ── Trending ── */
        .trending-section { width: 100%; max-width: 620px; text-align: left; }
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .trending-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            padding: 7px 14px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { background: var(--blue); color: white; border-color: var(--blue); transform: translateY(-1px); }
        .chip-loading { color: var(--text-light); font-size: 13px; font-style: italic; }

        /* ── Summary Screen ── */
        .summary-screen { max-width: 820px; margin: 0 auto; padding: 20px 20px 90px; }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
            gap: 8px;
            margin-bottom: 6px;
        }
        .img-cell {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            background: var(--card-bg);
        }
        .img-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .img-cell:hover img { transform: scale(1.08); }
        .img-count {
            font-size: 11px;
            color: var(--text-light);
            text-align: right;
            margin-bottom: 18px;
        }
        .no-images {
            grid-column: 1/-1;
            padding: 28px;
            color: var(--text-light);
            font-size: 14px;
            text-align: center;
        }

        /* Summary Card */
        .summary-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .summary-title {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-title i { color: var(--text-light); font-size: 17px; }
        .summary-text {
            color: var(--text-light);
            line-height: 1.75;
            font-size: 15px;
        }
        .cached-note {
            font-size: 11px;
            color: var(--text-light);
            font-style: italic;
            text-align: center;
            padding: 6px 0 12px;
            display: none;
        }

        /* Related Topics */
        .related-section { margin: 4px 0 18px; display: none; }
        .related-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .r-pill {
            padding: 4px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            color: var(--blue);
            cursor: pointer;
            transition: all 0.18s;
            user-select: none;
        }
        .r-pill:hover { background: var(--blue); color: white; border-color: var(--blue); }

        /* Action Buttons */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .btn {
            flex: 1;
            min-width: 130px;
            padding: 11px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .btn:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
        .btn .fa-google { color: #4285f4; }
        .btn .fa-youtube { color: #ff0000; }
        .btn .fa-wikipedia-w { color: var(--text-light); }

        /* Article iframe */
        .article-screen { height: calc(100vh - 118px); display: none; }
        .article-screen iframe { width: 100%; height: 100%; border: none; }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lightbox.active { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .lb-img-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px 56px 0;
            width: 100%;
        }
        .lb-img {
            max-width: 100%;
            max-height: 78vh;
            object-fit: contain;
            border-radius: 4px;
        }
        .lb-bottom {
            padding: 14px 20px 20px;
            text-align: center;
            width: 100%;
        }
        .lb-caption {
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            max-width: 88vw;
            margin: 0 auto 5px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .lb-counter { color: rgba(255,255,255,0.4); font-size: 12px; }
        .lb-close {
            position: fixed;
            top: 14px; right: 14px;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 17px;
            cursor: pointer;
            z-index: 3001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lb-close:hover { background: rgba(255,255,255,0.22); }
        .lb-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 3001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.22); }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }

        /* ── History Panel ── */
        .history-panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg);
            border-left: 1px solid var(--border);
            transition: right 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0,0,0,0.1);
        }
        .history-panel.open { right: 0; }
        .history-head {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .history-head h3 { font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .history-body { flex: 1; overflow-y: auto; padding: 0 20px; }
        .h-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .h-text { flex: 1; cursor: pointer; }
        .h-text:hover .h-query { color: var(--blue); }
        .h-query { font-size: 14px; font-weight: 500; }
        .h-time { font-size: 12px; color: var(--text-light); margin-top: 2px; }
        .h-del {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 13px;
        }
        .h-del:hover { color: var(--red); background: rgba(234,67,53,0.1); }
        .h-empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .h-empty i { font-size: 30px; opacity: 0.25; display: block; margin-bottom: 10px; }
        .txt-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .txt-btn:hover { background: var(--card-bg); }

        /* ── Footer ── */
        footer {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            bottom: 0;
            z-index: 99;
        }
        .footer-btn {
            color: var(--text-light);
            background: none;
            border: none;
            padding: 7px 16px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            border-radius: 8px;
            transition: color 0.2s;
        }
        .footer-btn i { font-size: 20px; }
        .footer-btn:hover, .footer-btn.active { color: var(--blue); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .home-logo { font-size: 52px; letter-spacing: -2px; }
            .history-panel { max-width: 100%; }
        }
        @media (max-width: 480px) {
            header { padding: 12px 16px 10px; }
            .logo { font-size: 22px; }
            .home-logo { font-size: 44px; }
            .home-sub { font-size: 16px; }
            .search-box { padding: 12px 80px 12px 16px; font-size: 15px; }
            .image-grid { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); }
            .btn { min-width: unset; font-size: 13px; }
            .lb-img-wrap { padding: 48px 48px 0; }
            .lb-prev { left: 6px; }
            .lb-next { right: 6px; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Searching Wikipedia...</div>
    </div>

    <!-- Header -->
    <header>
        <div class="logo" id="headerLogo">
            <span class="c1">S</span><span class="c2">e</span><span class="c3">a</span><span class="c4">r</span><span class="c5">c</span><span class="c6">h</span>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-box" id="searchInput" placeholder="Search Wikipedia..." autocomplete="off" spellcheck="false">
            <div class="search-actions">
                <button class="icon-btn" id="voiceBtn" title="Voice search">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="icon-btn" id="searchBtn" title="Search">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main>
        <!-- Home -->
        <div id="homeScreen" class="home">
            <div class="home-logo" id="homeLogo">
                <span class="c1">S</span><span class="c2">e</span><span class="c3">a</span><span class="c4">r</span><span class="c5">c</span><span class="c6">h</span>
            </div>
            <div class="home-sub">with SEM</div>

            <div class="shortcuts">
                <button class="shortcut" id="googleShortcut">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="shortcut" id="youtubeShortcut">
                    <i class="fab fa-youtube"></i> YouTube
                </button>
            </div>

            <div class="trending-section">
                <div class="section-label">
                    <i class="fas fa-fire-alt" style="color:var(--red);"></i> Trending Today
                </div>
                <div class="trending-chips" id="trendingChips">
                    <span class="chip-loading">Loading trending topics...</span>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div id="summaryScreen" class="summary-screen" style="display:none;">
            <div class="image-grid" id="imageGrid"></div>
            <div class="img-count" id="imgCount"></div>

            <div class="summary-card" id="summaryCard"></div>
            <div class="cached-note" id="cachedNote"></div>

            <div class="related-section" id="relatedSection">
                <div class="section-label"><i class="fas fa-link"></i> Related Topics</div>
                <div class="related-pills" id="relatedPills"></div>
            </div>

            <div class="actions">
                <button class="btn" id="wikiBtn">
                    <i class="fab fa-wikipedia-w"></i> Full Article
                </button>
                <button class="btn" id="googleSearchBtn">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="btn" id="youtubeSearchBtn">
                    <i class="fab fa-youtube"></i> YouTube
                </button>
                <button class="btn" id="shareBtn">
                    <i class="fas fa-share-alt"></i> Share
                </button>
            </div>
        </div>

        <!-- Article iframe -->
        <div id="articleScreen" class="article-screen">
            <iframe id="wikiFrame" src="" title="Wikipedia Article"></iframe>
        </div>
    </main>

    <!-- History Panel -->
    <div class="history-panel" id="historyPanel">
        <div class="history-head">
            <h3><i class="fas fa-history"></i> Search History</h3>
            <div style="display:flex;gap:6px;align-items:center;">
                <button class="txt-btn" id="clearHistoryBtn">Clear All</button>
                <button class="txt-btn" id="closeHistoryBtn"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="history-body" id="historyList"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" id="lbClose"><i class="fas fa-times"></i></button>
        <button class="lb-nav lb-prev" id="lbPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="lb-nav lb-next" id="lbNext"><i class="fas fa-chevron-right"></i></button>
        <div class="lb-img-wrap">
            <img class="lb-img" id="lbImg" src="" alt="">
        </div>
        <div class="lb-bottom">
            <div class="lb-caption" id="lbCaption"></div>
            <div class="lb-counter" id="lbCounter"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <button class="footer-btn active" id="homeBtn"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="footer-btn" id="summaryBtn"><i class="fas fa-file-alt"></i><span>Summary</span></button>
        <button class="footer-btn" id="historyBtn"><i class="fas fa-history"></i><span>History</span></button>
        <button class="footer-btn" id="themeBtn"><i class="fas fa-moon" id="themeIcon"></i><span>Theme</span></button>
    </footer>

<script>
'use strict';

// ── Service Worker ──────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
    });
}

// ── State ───────────────────────────────────────────────────────────
const App = {
    query: '',
    data: null,
    images: [],
    related: [],
    history: JSON.parse(localStorage.getItem('sem-history') || '[]'),
    cache: JSON.parse(localStorage.getItem('sem-cache') || '{}'),
    isOnline: navigator.onLine,
    recognition: null,
    isListening: false,
    lbIndex: 0,
    screen: 'home'
};

// ── DOM ─────────────────────────────────────────────────────────────
const el = id => document.getElementById(id);
const D = {
    loading: el('loading'),
    loadingText: el('loadingText'),
    searchInput: el('searchInput'),
    voiceBtn: el('voiceBtn'),
    searchBtn: el('searchBtn'),
    homeScreen: el('homeScreen'),
    summaryScreen: el('summaryScreen'),
    articleScreen: el('articleScreen'),
    imageGrid: el('imageGrid'),
    imgCount: el('imgCount'),
    summaryCard: el('summaryCard'),
    cachedNote: el('cachedNote'),
    relatedSection: el('relatedSection'),
    relatedPills: el('relatedPills'),
    wikiBtn: el('wikiBtn'),
    googleSearchBtn: el('googleSearchBtn'),
    youtubeSearchBtn: el('youtubeSearchBtn'),
    shareBtn: el('shareBtn'),
    wikiFrame: el('wikiFrame'),
    trendingChips: el('trendingChips'),
    googleShortcut: el('googleShortcut'),
    youtubeShortcut: el('youtubeShortcut'),
    historyPanel: el('historyPanel'),
    historyList: el('historyList'),
    clearHistoryBtn: el('clearHistoryBtn'),
    closeHistoryBtn: el('closeHistoryBtn'),
    lightbox: el('lightbox'),
    lbImg: el('lbImg'),
    lbCaption: el('lbCaption'),
    lbCounter: el('lbCounter'),
    lbClose: el('lbClose'),
    lbPrev: el('lbPrev'),
    lbNext: el('lbNext'),
    homeBtn: el('homeBtn'),
    summaryBtn: el('summaryBtn'),
    historyBtn: el('historyBtn'),
    themeBtn: el('themeBtn'),
    themeIcon: el('themeIcon'),
    headerLogo: el('headerLogo'),
    homeLogo: el('homeLogo')
};

// ── Boot ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    // Theme
    if (localStorage.getItem('sem-theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        D.themeIcon.className = 'fas fa-sun';
    }
    // Restore last search
    const last = localStorage.getItem('lastSearch');
    if (last) D.searchInput.value = last;
    // Setup
    initVoice();
    bindEvents();
    renderHistory();
    loadTrending();
    // Network
    window.addEventListener('online', () => { App.isOnline = true; toast('Back online'); });
    window.addEventListener('offline', () => { App.isOnline = false; toast('Offline — using cache'); });
});

// ── Events ──────────────────────────────────────────────────────────
function bindEvents() {
    D.searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
    D.searchBtn.addEventListener('click', search);
    D.voiceBtn.addEventListener('click', toggleVoice);
    D.headerLogo.addEventListener('click', goHome);
    D.homeLogo.addEventListener('click', goHome);
    D.homeBtn.addEventListener('click', goHome);
    D.summaryBtn.addEventListener('click', () => { if (App.data) showSummary(); });
    D.historyBtn.addEventListener('click', openHistory);
    D.themeBtn.addEventListener('click', toggleTheme);
    D.clearHistoryBtn.addEventListener('click', clearHistory);
    D.closeHistoryBtn.addEventListener('click', closeHistory);
    D.wikiBtn.addEventListener('click', openArticle);
    D.googleSearchBtn.addEventListener('click', () => openExternal('google'));
    D.youtubeSearchBtn.addEventListener('click', () => openExternal('youtube'));
    D.shareBtn.addEventListener('click', shareResult);
    D.googleShortcut.addEventListener('click', () => openExternal('google'));
    D.youtubeShortcut.addEventListener('click', () => openExternal('youtube'));
    // Lightbox
    D.lbClose.addEventListener('click', closeLightbox);
    D.lbPrev.addEventListener('click', () => shiftLb(-1));
    D.lbNext.addEventListener('click', () => shiftLb(1));
    D.lightbox.addEventListener('click', e => { if (e.target === D.lightbox) closeLightbox(); });
    // Keyboard
    document.addEventListener('keydown', e => {
        if (D.lightbox.classList.contains('active')) {
            if (e.key === 'ArrowLeft') shiftLb(-1);
            else if (e.key === 'ArrowRight') shiftLb(1);
            else if (e.key === 'Escape') closeLightbox();
        } else if (e.key === 'Escape') {
            closeHistory();
        }
    });
    // Swipe on lightbox
    let touchX = 0;
    D.lightbox.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
    D.lightbox.addEventListener('touchend', e => {
        const diff = touchX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 48) shiftLb(diff > 0 ? 1 : -1);
    });
    // Close history on outside tap
    document.addEventListener('click', e => {
        if (!D.historyPanel.contains(e.target) && e.target !== D.historyBtn && !D.historyBtn.contains(e.target)) {
            closeHistory();
        }
    });
}

// ── Trending ─────────────────────────────────────────────────────────
async function loadTrending() {
    try {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/featured/${y}/${m}/${d}`);
        const data = await res.json();
        const topics = (data.mostread?.articles || [])
            .filter(a => !a.title.includes(':'))
            .slice(0, 10)
            .map(a => a.titles?.normalized || a.title.replace(/_/g, ' '));
        renderChips(topics.length ? topics : fallback());
    } catch {
        renderChips(fallback());
    }
}

function fallback() {
    return ['Artificial Intelligence', 'Climate Change', 'Quantum Physics', 'Solar System', 'DNA', 'Ancient Rome', 'Black Holes'];
}

function renderChips(topics) {
    D.trendingChips.innerHTML = '';
    topics.forEach(topic => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = topic;
        chip.addEventListener('click', () => {
            D.searchInput.value = topic;
            search();
        });
        D.trendingChips.appendChild(chip);
    });
}

// ── Search ───────────────────────────────────────────────────────────
async function search() {
    const query = D.searchInput.value.trim();
    if (!query) { toast('Enter something to search'); return; }
    App.query = query;
    D.loadingText.textContent = 'Searching Wikipedia...';
    D.loading.classList.add('active');
    try {
        if (!App.isOnline && App.cache[query]) {
            loadCache(query);
            toast('Showing cached results (offline)');
        } else {
            await fetchWiki(query);
            saveCache(query);
        }
        addToHistory(query);
        localStorage.setItem('lastSearch', query);
        showSummary();
    } catch (err) {
        console.error(err);
        toast('Nothing found. Try a different search.');
    } finally {
        D.loading.classList.remove('active');
    }
}

async function fetchWiki(query) {
    D.loadingText.textContent = 'Fetching summary...';
    const sumRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
    if (!sumRes.ok) throw new Error('Not found');
    const sumData = await sumRes.json();
    if (sumData.type && sumData.type.includes('not_found')) throw new Error('Not found');

    const title = sumData.title;
    D.loadingText.textContent = 'Loading images & related...';

    const [images, related] = await Promise.all([
        fetchImages(title),
        fetchRelated(title)
    ]);

    App.data = {
        title,
        text: sumData.extract || 'No summary available.',
        url: sumData.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`,
        timestamp: Date.now()
    };
    App.images = images;
    App.related = related;
    renderResults();
}

async function fetchImages(title) {
    // Primary: article media list
    try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/media-list/${encodeURIComponent(title)}`);
        const data = await res.json();
        const imgs = (data.items || [])
            .filter(item => {
                if (item.type !== 'image') return false;
                const t = (item.title || '').toLowerCase();
                return !t.includes('icon') && !t.includes('commons-logo') &&
                       !t.includes('wikimedia') && (item.srcset || []).length > 0;
            })
            .map(item => {
                const srcset = item.srcset || [];
                // pick highest resolution (last tends to be largest)
                const best = srcset[srcset.length - 1]?.src || srcset[0]?.src;
                if (!best) return null;
                return {
                    src: best.startsWith('//') ? 'https:' + best : best,
                    title: item.caption?.text || (item.title || '').replace('File:', '').replace(/_/g, ' ').split('.')[0]
                };
            })
            .filter(Boolean);
        if (imgs.length > 0) return imgs;
    } catch {}
    // Fallback: search-based images
    try {
        const res = await fetch(
            `https://en.wikipedia.org/w/api.php?origin=*&action=query&generator=search&gsrsearch=${encodeURIComponent(title)}&gsrlimit=16&prop=pageimages&pithumbsize=800&format=json`
        );
        const json = await res.json();
        return Object.values(json.query?.pages || {})
            .filter(p => p.thumbnail)
            .map(p => ({ src: p.thumbnail.source, title: p.title }));
    } catch {
        return [];
    }
}

async function fetchRelated(title) {
    try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/related/${encodeURIComponent(title)}`);
        const data = await res.json();
        return (data.pages || []).slice(0, 10).map(p => ({
            title: p.titles?.normalized || p.title,
            description: p.description || ''
        }));
    } catch {
        return [];
    }
}

function loadCache(query) {
    const c = App.cache[query];
    if (!c) throw new Error('No cache');
    App.data = c.data;
    App.images = c.images || [];
    App.related = c.related || [];
    renderResults();
    D.cachedNote.textContent = `Cached result from ${new Date(c.timestamp).toLocaleString()}`;
    D.cachedNote.style.display = 'block';
}

function saveCache(query) {
    App.cache[query] = {
        data: App.data,
        images: App.images,
        related: App.related,
        timestamp: Date.now()
    };
    // Keep last 20 entries
    const keys = Object.keys(App.cache);
    if (keys.length > 20) {
        const oldest = keys.sort((a, b) => App.cache[a].timestamp - App.cache[b].timestamp)[0];
        delete App.cache[oldest];
    }
    localStorage.setItem('sem-cache', JSON.stringify(App.cache));
}

// ── Render ───────────────────────────────────────────────────────────
function renderResults() {
    D.cachedNote.style.display = 'none';

    // Image grid
    D.imageGrid.innerHTML = '';
    if (App.images.length === 0) {
        D.imageGrid.innerHTML = '<div class="no-images"><i class="fas fa-image" style="opacity:0.3;margin-right:6px;"></i>No images found</div>';
        D.imgCount.textContent = '';
    } else {
        App.images.forEach((img, i) => {
            const cell = document.createElement('div');
            cell.className = 'img-cell';
            const image = document.createElement('img');
            image.src = img.src;
            image.alt = img.title || '';
            image.loading = 'lazy';
            image.onerror = () => { cell.style.display = 'none'; };
            cell.appendChild(image);
            cell.addEventListener('click', () => openLightbox(i));
            D.imageGrid.appendChild(cell);
        });
        D.imgCount.textContent = `${App.images.length} image${App.images.length !== 1 ? 's' : ''} — tap to view`;
    }

    // Summary
    D.summaryCard.innerHTML = `
        <div class="summary-title">
            <i class="fab fa-wikipedia-w"></i>
            ${escHtml(App.data.title)}
        </div>
        <div class="summary-text">${escHtml(App.data.text)}</div>
    `;

    // Related
    if (App.related.length > 0) {
        D.relatedPills.innerHTML = '';
        App.related.forEach(r => {
            const pill = document.createElement('span');
            pill.className = 'r-pill';
            pill.textContent = r.title;
            pill.addEventListener('click', () => {
                D.searchInput.value = r.title;
                search();
            });
            D.relatedPills.appendChild(pill);
        });
        D.relatedSection.style.display = 'block';
    } else {
        D.relatedSection.style.display = 'none';
    }
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Lightbox ─────────────────────────────────────────────────────────
function openLightbox(index) {
    App.lbIndex = index;
    updateLightbox();
    D.lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    D.lightbox.classList.remove('active');
    document.body.style.overflow = '';
}

function shiftLb(dir) {
    App.lbIndex = (App.lbIndex + dir + App.images.length) % App.images.length;
    updateLightbox();
}

function updateLightbox() {
    const img = App.images[App.lbIndex];
    D.lbImg.src = img.src;
    D.lbImg.alt = img.title || '';
    D.lbCaption.textContent = img.title || '';
    D.lbCounter.textContent = `${App.lbIndex + 1} / ${App.images.length}`;
    const multi = App.images.length > 1;
    D.lbPrev.style.display = multi ? 'flex' : 'none';
    D.lbNext.style.display = multi ? 'flex' : 'none';
}

// ── Navigation ───────────────────────────────────────────────────────
function hideAll() {
    D.homeScreen.style.display = 'none';
    D.summaryScreen.style.display = 'none';
    D.articleScreen.style.display = 'none';
}

function goHome() {
    hideAll();
    D.homeScreen.style.display = 'flex';
    App.screen = 'home';
    setActive('home');
}

function showSummary() {
    hideAll();
    D.summaryScreen.style.display = 'block';
    App.screen = 'summary';
    setActive('summary');
    window.scrollTo(0, 0);
}

function openArticle() {
    if (!App.data?.url) { toast('No article URL available'); return; }
    hideAll();
    D.articleScreen.style.display = 'block';
    D.wikiFrame.src = App.data.url;
    App.screen = 'article';
    setActive('summary');
}

function setActive(tab) {
    [D.homeBtn, D.summaryBtn, D.historyBtn, D.themeBtn].forEach(b => b.classList.remove('active'));
    if (tab === 'home') D.homeBtn.classList.add('active');
    if (tab === 'summary') D.summaryBtn.classList.add('active');
}

// ── External Links ────────────────────────────────────────────────────
function openExternal(service) {
    const q = encodeURIComponent(App.query || '');
    if (service === 'google') {
        window.open(q ? `https://www.google.com/search?q=${q}` : 'https://www.google.com', '_blank', 'noopener');
    } else {
        window.open(q ? `https://www.youtube.com/results?search_query=${q}` : 'https://www.youtube.com', '_blank', 'noopener');
    }
}

// ── Share ─────────────────────────────────────────────────────────────
function shareResult() {
    if (!App.data) { toast('Nothing to share'); return; }
    const text = `${App.data.title}\n\n${App.data.text.substring(0, 250)}...\n\n${App.data.url}`;
    if (navigator.share) {
        navigator.share({ title: App.data.title, text, url: App.data.url }).catch(() => {});
    } else {
        navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard'));
    }
}

// ── History ───────────────────────────────────────────────────────────
function addToHistory(query) {
    App.history = App.history.filter(h => h.query !== query);
    App.history.unshift({ query, timestamp: Date.now() });
    if (App.history.length > 50) App.history.length = 50;
    localStorage.setItem('sem-history', JSON.stringify(App.history));
    renderHistory();
}

function renderHistory() {
    if (App.history.length === 0) {
        D.historyList.innerHTML = '<div class="h-empty"><i class="fas fa-history"></i><p>No history yet</p></div>';
        return;
    }
    D.historyList.innerHTML = '';
    App.history.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'h-item';
        div.innerHTML = `
            <div class="h-text">
                <div class="h-query">${escHtml(item.query)}</div>
                <div class="h-time">${timeAgo(item.timestamp)}</div>
            </div>
            <button class="h-del" title="Delete"><i class="fas fa-trash"></i></button>
        `;
        div.querySelector('.h-text').addEventListener('click', () => {
            D.searchInput.value = item.query;
            closeHistory();
            search();
        });
        div.querySelector('.h-del').addEventListener('click', e => {
            e.stopPropagation();
            App.history.splice(i, 1);
            localStorage.setItem('sem-history', JSON.stringify(App.history));
            renderHistory();
            toast('Deleted');
        });
        D.historyList.appendChild(div);
    });
}

function clearHistory() {
    if (!confirm('Clear all history?')) return;
    App.history = [];
    localStorage.removeItem('sem-history');
    renderHistory();
    toast('History cleared');
}

function openHistory() {
    D.historyPanel.classList.add('open');
    D.historyBtn.classList.add('active');
}

function closeHistory() {
    D.historyPanel.classList.remove('open');
}

// ── Theme ─────────────────────────────────────────────────────────────
function toggleTheme() {
    const dark = document.body.getAttribute('data-theme') === 'dark';
    if (dark) {
        document.body.removeAttribute('data-theme');
        D.themeIcon.className = 'fas fa-moon';
        localStorage.setItem('sem-theme', 'light');
    } else {
        document.body.setAttribute('data-theme', 'dark');
        D.themeIcon.className = 'fas fa-sun';
        localStorage.setItem('sem-theme', 'dark');
    }
}

// ── Voice ─────────────────────────────────────────────────────────────
function initVoice() {
    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        D.voiceBtn.style.display = 'none';
        return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    App.recognition = new SR();
    App.recognition.continuous = false;
    App.recognition.interimResults = false;
    App.recognition.lang = 'en-US';
    App.recognition.onstart = () => { App.isListening = true; D.voiceBtn.classList.add('listening'); toast('Listening...'); };
    App.recognition.onresult = e => { D.searchInput.value = e.results[0][0].transcript; search(); };
    App.recognition.onerror = () => stopVoice();
    App.recognition.onend = () => stopVoice();
}

function toggleVoice() {
    if (!App.recognition) { toast('Voice search not supported'); return; }
    if (App.isListening) {
        stopVoice();
    } else {
        try { App.recognition.start(); } catch {}
    }
}

function stopVoice() {
    App.isListening = false;
    D.voiceBtn.classList.remove('listening');
    try { App.recognition?.stop(); } catch {}
}

// ── Utilities ─────────────────────────────────────────────────────────
function toast(msg) {
    // Remove existing toasts
    document.querySelectorAll('.sem-toast').forEach(t => t.remove());
    const t = document.createElement('div');
    t.className = 'sem-toast';
    t.style.cssText = 'position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:8px;font-size:13px;z-index:4000;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.25);pointer-events:none;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s';
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 320);
    }, 2600);
}

function timeAgo(ts) {
    const d = Date.now() - ts;
    if (d < 60000) return 'Just now';
    if (d < 3600000) return `${Math.floor(d / 60000)}m ago`;
    if (d < 86400000) return `${Math.floor(d / 3600000)}h ago`;
    if (d < 604800000) return `${Math.floor(d / 86400000)}d ago`;
    return new Date(ts).toLocaleDateString();
}
